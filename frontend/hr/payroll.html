<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HR - Payrolls</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>HR Panel</h2>
      <nav>
        <a href="/hr/dashboard/">Dashboard</a>
        <a href="/hr/employees/">Employees</a>
        <a class="active" href="/hr/payrolls/">Payrolls</a>
        <button id="logoutBtn">Logout</button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="content">

      <h2>Payroll Overview</h2>

      <!-- Month Cards -->
      <div id="month-cards" class="month-container"></div>

      <hr style="margin: 25px 0;" />

      <!-- Selected Month -->
      <h3 id="selected-month-title">Select a month</h3>

      <!-- Filters -->
      <div class="filter-row">
        <button onclick="filterEmployees('ALL')">All</button>
        <button onclick="filterEmployees('PAID')">Paid</button>
        <button onclick="filterEmployees('PENDING')">Unpaid</button>
        <button onclick="generateAllUnpaid()" class="generate-all-btn">
          Generate All Unpaid Slips
        </button>
      </div>

      <!-- Employee Table -->
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Status</th>
            <th>Salary Slip</th>
          </tr>
        </thead>
        <tbody id="employee-table-body">
          <tr>
            <td colspan="3">Select a month to view employees</td>
          </tr>
        </tbody>
      </table>

    </main>
  </div>

  <!-- Scripts -->
  <script type="module" src="/static/js/api.js"></script>
  <script type="module" src="/static/js/auth.js"></script>
  <script type="module" src="/static/js/payroll.js"></script>
</body>
</html>
