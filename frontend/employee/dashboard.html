<!DOCTYPE html>
<html>
<head>
  <title>Employee Dashboard</title>

  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="main">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <h2>Employee Dashboard</h2>
      <p class="subtitle">Your salary & attendance overview</p>
    </div>

    <div class="toolbar-actions">
      <button id="leavePageBtn" class="btn-secondary">My Leaves</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="employee-toolbar">
    <div>
      <label>Year:</label>
      <select id="yearFilter">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
      </select>
    </div>

    <div class="toolbar-actions">
      <button id="exportCSV">Export CSV</button>
      <button id="downloadZIP">Download Slips</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">

    <div class="stat-card blue">
      <h4>Total Payslips</h4>
      <p id="totalPayslips">0</p>
    </div>

    <div class="stat-card green">
      <h4>Total Earned</h4>
      <p id="totalEarned">₹0</p>
    </div>

    <div class="stat-card orange">
      <h4>Last Salary</h4>
      <p id="lastSalary">₹0</p>
    </div>

    <div class="stat-card">
      <h4>Highest Salary</h4>
      <p id="highestSalary">₹0</p>
    </div>

    <div class="stat-card">
      <h4>Average Salary</h4>
      <p id="averageSalary">₹0</p>
    </div>

  </div>

  <!-- SALARY GRAPH -->
  <div class="dashboard-section">
    <h3>Salary Trend</h3>
    <canvas id="salaryChart" height="100"></canvas>
  </div>

  <!-- ATTENDANCE -->
  <div class="dashboard-section" style="margin-top:20px;">

    <div class="attendance-header">
      <h3>Attendance</h3>

      <div class="attendance-actions">
        <button id="checkInBtn" class="btn-primary">Check In</button>
        <button id="checkOutBtn" class="btn-danger">Check Out</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Check In</th>
          <th>Check Out</th>
          <th>Hours</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="attendanceTable"></tbody>
    </table>

  </div>

  <!-- PAYROLL -->
  <div class="dashboard-section" style="margin-top:20px;">
    <h3>Salary Slips</h3>

    <table>
      <thead>
        <tr>
          <th>Month</th>
          <th>Year</th>
          <th>Net Salary</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="payrollTable"></tbody>
    </table>

  </div>

</div>

<script type="module" src="/static/js/employee_dashboard.js"></script>

</body>
</html>
